services:
  dashboard:
    build: .
    image: mathrobust
    ports:
      - "8765:8765"
    # Uncomment to evaluate real models from inside the container:
    # env_file: .env
    volumes:
      - ./results:/app/results
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8765/api/config'); sys.exit(0)"]
      interval: 5s
      timeout: 3s
      retries: 10

  # UI + API + unit tests against the running dashboard, in the official
  # Playwright image (Chromium preinstalled).  `docker compose --profile test run --rm tests`
  tests:
    image: mcr.microsoft.com/playwright/python:v1.49.0-jammy
    profiles: ["test"]
    depends_on:
      dashboard:
        condition: service_healthy
    environment:
      MATHROBUST_DASHBOARD_URL: "http://dashboard:8765"
      PYTHONPATH: /work
    volumes:
      - ./mathrobust:/work/mathrobust:ro
      - ./tests:/work/tests:ro
      - ./requirements-dev.txt:/work/requirements-dev.txt:ro
      - ./pytest.ini:/work/pytest.ini:ro
    working_dir: /work
    command: >
      bash -lc "pip install -q -r requirements-dev.txt &&
                python -m pytest tests -v"
